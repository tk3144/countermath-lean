name = "countermath"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Countermath"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "Countermath"

[[require]]
name = "lspec"
scope = "argumentcomputer"
rev = "main"
